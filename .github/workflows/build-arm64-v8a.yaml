name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        submodules: recursive  # 递归检出子模块
    
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v2
    
    - name: 授予 Gradle 执行权限
      run: chmod +x gradlew
    
    - name: 构建 Release APK
      run: ./gradlew assembleRelease
      env:
        ORG_GRADLE_PROJECT_ndkVersion: "25.2.9519653"
    
    - name: 上传 APK 作为构建产物
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-android-apk
        path: |
          ui/build/outputs/apk/release/ui-release.apk
          ui/build/outputs/apk/release/ui-release-unsigned.apk
        retention-days: 7
